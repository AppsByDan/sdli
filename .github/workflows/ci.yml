name: ci

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: libsdl-org/setup-sdl@main
      id: sdl
      with:
        install-linux-dependencies: true
        version: 3.2.20
        version-sdl-ttf: 3.2.2
    - name: Build
      run: |
        cmake --preset debug
        cmake --build build-debug
    - uses: actions/upload-artifact@v7
      with:
        name: sdli-linux-x64
        path: build-debug/bin/sdli
  build-linux-mingw:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64
    - name: Build
      run: |
        cmake --preset debug-mingw-cross
        cmake --build build-debug-mingw
    - uses: actions/upload-artifact@v7
      with:
        name: sdli-linux-mingw-x64
        path: |
          build-debug-mingw/bin/sdli.exe
          build-debug-mingw/bin/SDL3.dll
          build-debug-mingw/bin/SDL3_ttf.dll
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build
      run: |
        cmake --preset debug
        cmake --build build-debug
    - uses: actions/upload-artifact@v7
      with:
        name: sdli-windows-x64
        path: |
          build-debug-mingw/bin/sdli.exe
          build-debug-mingw/bin/SDL3.dll
          build-debug-mingw/bin/SDL3_ttf.dll
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2
    - name: Build
      run: |
        cmake --preset debug
        cmake --build build-debug
    - uses: actions/upload-artifact@v7
      with:
        name: sdli-macos-x64
        path: build-debug/bin/sdli.app
